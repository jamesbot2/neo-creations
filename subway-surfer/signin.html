<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Subway Surfer - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16213e;padding:40px;border-radius:16px;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{font-size:48px}
h1{color:#ff6600;font-size:28px;margin-bottom:5px;letter-spacing:2px}
.sub{color:#888;font-size:13px;margin-bottom:20px}
input{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:#fff;font-size:15px;outline:none;box-sizing:border-box}
input:focus{border-color:#ff6600}
.btn{width:100%;padding:12px;border-radius:8px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s;margin:4px 0}
.btn:active{transform:scale(0.95)}
.btn-primary{border-color:#ff6600;color:#ff6600;background:rgba(255,102,0,0.15)}
.btn-secondary{border-color:#4CAF50;color:#4CAF50;background:rgba(76,175,80,0.1)}
.btn-link{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:8px}
.btn-link:hover{color:#fff}
.msg{font-size:13px;margin:8px 0;min-height:20px}
.error{color:#ff4444}
.success{color:#4CAF50}
.info{color:#ffaa00}
.hidden{display:none}
.tab-bar{margin-bottom:15px}
.tab{display:inline-block;padding:8px 24px;cursor:pointer;border-radius:20px;font-size:14px;transition:all .2s}
.tab.active{background:rgba(255,102,0,0.25);color:#ff6600;font-weight:bold}
.tab:not(.active){color:#666}
.tab:not(.active):hover{color:#aaa}
#captcha-img{background:#2a2a4a;border-radius:8px;padding:8px;margin:6px 0;text-align:center}
#captcha-img svg{display:block;margin:0 auto}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏃</div>
  <h1>SUBWAY SURFER</h1>
  <div class="sub">Sign in to play</div>

  <div class="tab-bar">
    <span class="tab active" id="tab-login" onclick="showTab('login')">LOGIN</span>
    <span class="tab" id="tab-register" onclick="showTab('register')">REGISTER</span>
  </div>

  <!-- LOGIN -->
  <div id="login-form">
    <input id="email" type="email" placeholder="Email" autocomplete="email">
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
    <label style="display:flex;align-items:center;gap:6px;margin:6px 0;color:#888;font-size:13px;cursor:pointer">
      <input id="remember" type="checkbox" checked style="width:auto"> Remember me
    </label>
    <div id="login-msg" class="msg"></div>
    <button class="btn btn-primary" onclick="doLogin()">LOGIN</button>
    <button class="btn-link" onclick="showTab('register')">No account? Register</button>
  </div>

  <!-- REGISTER -->
  <div id="register-form" class="hidden">
    <input id="reg-name" type="text" placeholder="Username (2-16 chars)" maxlength="16">
    <input id="reg-email" type="email" placeholder="Email">
    <input id="reg-pass" type="password" placeholder="Password (6+ chars)">
    <div id="captcha-img"></div>
    <input id="captcha" type="text" maxlength="5" placeholder="Enter code from image" style="text-align:center;letter-spacing:4px">
    <div id="reg-msg" class="msg"></div>
    <button class="btn btn-secondary" onclick="doRegister()">REGISTER</button>
    <button class="btn-link" onclick="showTab('login')">Already have account? Login</button>
  </div>

  <!-- VERIFY CODE -->
  <div id="verify-form" class="hidden">
    <p style="color:#aaa;font-size:13px;">Code sent to <span id="verify-email" style="color:#fff;"></span></p>
    <input id="code" type="text" maxlength="6" placeholder="000000" style="text-align:center;font-size:22px;letter-spacing:8px;font-weight:bold">
    <div id="verify-msg" class="msg"></div>
    <button class="btn btn-primary" onclick="doVerify()">VERIFY</button>
  </div>
</div>

<script>
var API = 'http://' + location.hostname + ':3000';
var captchaId = '';

// Auto-fill remembered email
var r = localStorage.getItem('subwayRemember');
if (r) document.getElementById('email').value = r;

// Check if already logged in
var tok = localStorage.getItem('subwayToken');
if (tok) {
  fetch(API + '/api/load', { headers: { Authorization: 'Bearer ' + tok } })
    .then(function(r) { if (r.ok) window.location.href = 'game.html'; })
    .catch(function(){});
}

function msg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (type || 'info');
}

function showTab(tab) {
  document.getElementById('tab-login').className = tab === 'login' ? 'tab active' : 'tab';
  document.getElementById('tab-register').className = tab === 'register' ? 'tab active' : 'tab';
  document.getElementById('login-form').className = tab === 'login' ? '' : 'hidden';
  document.getElementById('register-form').className = tab === 'register' ? '' : 'hidden';
  document.getElementById('verify-form').className = 'hidden';
  if (tab === 'register') loadCaptcha();
}

function loadCaptcha() {
  fetch(API + '/api/captcha').then(function(r) { return r.json(); }).then(function(d) {
    captchaId = d.captchaId;
    document.getElementById('captcha-img').innerHTML = d.svg;
    document.getElementById('captcha').value = '';
  }).catch(function() {});
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('verify-form').classList.contains('hidden')) { doVerify(); return; }
  if (!document.getElementById('login-form').classList.contains('hidden')) { doLogin(); return; }
  if (!document.getElementById('register-form').classList.contains('hidden')) { doRegister(); return; }
});

function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('pass').value;
  if (!email || !password) { msg('login-msg', 'Fill in all fields', 'error'); return; }

  fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { msg('login-msg', data.error, 'error'); return; }
    localStorage.setItem('subwayToken', data.token);
    localStorage.setItem('subwayEmail', data.email);
    if (document.getElementById('remember').checked) localStorage.setItem('subwayRemember', email);
    else localStorage.removeItem('subwayRemember');
    msg('login-msg', 'Logged in!', 'success');
    setTimeout(function() { window.location.href = 'game.html'; }, 300);
  }).catch(function() { msg('login-msg', 'Server error', 'error'); });
}

function doRegister() {
  var name = document.getElementById('reg-name').value.trim();
  var email = document.getElementById('reg-email').value.trim();
  var password = document.getElementById('reg-pass').value;
  var cap = document.getElementById('captcha').value.trim();
  if (!name || !email || !password) { msg('reg-msg', 'Fill in all fields', 'error'); return; }
  if (name.length < 2 || name.length > 16) { msg('reg-msg', 'Username 2-16 chars', 'error'); return; }
  if (password.length < 6) { msg('reg-msg', 'Password needs 6+ characters', 'error'); return; }
  if (!cap) { msg('reg-msg', 'Enter captcha code', 'error'); return; }

  fetch(API + '/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password, username: name, captchaId: captchaId, captchaAnswer: cap })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { msg('reg-msg', data.error, 'error'); loadCaptcha(); return; }
    document.getElementById('verify-email').textContent = email;
    document.getElementById('register-form').className = 'hidden';
    document.getElementById('verify-form').className = '';
    msg('verify-msg', '📧 Verification code sent to ' + email + '. Check your inbox!', 'success');
  }).catch(function() { msg('reg-msg', 'Server error', 'error'); });
}

function doVerify() {
  var email = document.getElementById('verify-email').textContent;
  var code = document.getElementById('code').value.trim();
  if (!code || code.length < 4) { msg('verify-msg', 'Enter the code', 'error'); return; }

  fetch(API + '/api/verify-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, code: code })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { msg('verify-msg', data.error, 'error'); return; }
    msg('verify-msg', 'Verified! Now login.', 'success');
    document.getElementById('email').value = email;
    setTimeout(function() { showTab('login'); }, 1000);
  }).catch(function() { msg('verify-msg', 'Server error', 'error'); });
}
</script>
</body>
</html>
