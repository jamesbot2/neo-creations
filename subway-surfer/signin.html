<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Subway Surfer - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16213e;padding:40px;border-radius:16px;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{font-size:48px;margin-bottom:5px}
h1{color:#ff6600;font-size:28px;margin-bottom:5px;letter-spacing:2px}
.sub{color:#888;font-size:13px;margin-bottom:20px}
input{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:#fff;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#ff6600}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:12px;border-radius:8px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(0.95)}
.btn-primary{border-color:#ff6600;background:rgba(255,102,0,0.2);color:#ff6600}
.btn-primary:hover{background:rgba(255,102,0,0.35)}
.btn-secondary{border-color:#4CAF50;background:rgba(76,175,80,0.1);color:#4CAF50}
.btn-secondary:hover{background:rgba(76,175,80,0.25)}
.msg{font-size:13px;margin:8px 0;min-height:20px}
.msg-error{color:#ff4444}
.msg-ok{color:#4CAF50}
.msg-info{color:#ffaa00}
.hidden{display:none}
.code-input input{letter-spacing:8px;font-size:22px;text-align:center;font-weight:bold}
.divider{margin:15px 0;border:none;border-top:1px solid rgba(255,255,255,0.08)}
.tab{display:inline-block;padding:8px 20px;cursor:pointer;border-radius:20px;font-size:14px;transition:all .2s;margin:0 4px}
.tab.active{background:rgba(255,102,0,0.25);color:#ff6600;font-weight:bold}
.tab:not(.active){color:#666}
.tab:not(.active):hover{color:#aaa}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏃</div>
  <h1>SUBWAY SURFER</h1>
  <div class="sub">Sign in to play</div>

  <div style="margin-bottom:15px">
    <span class="tab active" id="tab-login" onclick="switchTab('login')">LOGIN</span>
    <span class="tab" id="tab-register" onclick="switchTab('register')">REGISTER</span>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <input id="login-email" type="email" placeholder="Email" autocomplete="email">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <label style="display:flex;align-items:center;gap:6px;margin:6px 0 10px 4px;color:#888;font-size:13px;cursor:pointer"><input id="remember-me" type="checkbox" checked> Remember me</label>
    <div class="msg" id="login-msg"></div>
    <button class="btn btn-primary" onclick="doLogin()">LOGIN</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" class="hidden">
    <input id="reg-email" type="email" placeholder="Email">
    <input id="reg-pass" type="password" placeholder="Password (6+ chars)">
    <div class="msg" id="reg-msg"></div>
    <button class="btn btn-secondary" onclick="doRegister()">SEND CODE</button>
  </div>

  <!-- CODE VERIFICATION -->
  <div id="form-code" class="hidden">
    <p style="color:#aaa;font-size:13px;margin-bottom:8px;">Enter the 6-digit code sent to <span id="code-email" style="color:#fff;"></span></p>
    <div class="code-input">
      <input id="code-input" type="text" maxlength="6" placeholder="000000" inputmode="numeric">
    </div>
    <div class="msg" id="code-msg"></div>
    <button class="btn btn-primary" onclick="doVerify()">VERIFY</button>
  </div>

  <hr class="divider">
  <div style="color:#555;font-size:11px;">Play anywhere • Cloud saves • Leaderboard</div>
</div>

<script>
var API = 'http://' + location.hostname + ':3000';

// Check if already logged in
// Auto-fill remembered email
var remembered = localStorage.getItem('subwayRemember');
if (remembered) {
  document.getElementById('login-email').value = remembered;
  document.getElementById('login-pass').focus();
}

var existingToken = localStorage.getItem('subwayToken');
if (existingToken) {
  // Verify token is still valid by trying to load
  fetch(API + '/api/load', { headers: { 'Authorization': 'Bearer ' + existingToken } })
    .then(function(r) { if (r.ok) window.location.href = 'game.html'; })
    .catch(function(){});
}

function switchTab(tab) {
  document.getElementById('tab-login').className = tab === 'login' ? 'tab active' : 'tab';
  document.getElementById('tab-register').className = tab === 'register' ? 'tab active' : 'tab';
  document.getElementById('form-login').className = tab === 'login' ? '' : 'hidden';
  document.getElementById('form-register').className = tab === 'register' ? '' : 'hidden';
  document.getElementById('form-code').className = 'hidden';
}

function setMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg msg-' + type;
}

// Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('form-code').classList.contains('hidden')) { doVerify(); return; }
  if (!document.getElementById('form-login').classList.contains('hidden')) { doLogin(); return; }
  if (!document.getElementById('form-register').classList.contains('hidden')) { doRegister(); return; }
});

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  if (!email || !pass) { setMsg('login-msg', 'Fill in all fields', 'error'); return; }

  fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pass })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { setMsg('login-msg', data.error, 'error'); return; }
    localStorage.setItem('subwayToken', data.token);
    localStorage.setItem('subwayEmail', data.email);
    if (document.getElementById('remember-me').checked) {
      localStorage.setItem('subwayRemember', data.email);
    } else {
      localStorage.removeItem('subwayRemember');
    }
    setMsg('login-msg', '✓ Logged in!', 'ok');
    setTimeout(function() { window.location.href = 'game.html'; }, 500);
  }).catch(function() { setMsg('login-msg', 'Server error', 'error'); });
}

function doRegister() {
  var email = document.getElementById('reg-email').value.trim();
  var pass = document.getElementById('reg-pass').value;
  if (!email || !pass) { setMsg('reg-msg', 'Fill in all fields', 'error'); return; }
  if (pass.length < 6) { setMsg('reg-msg', 'Password needs 6+ characters', 'error'); return; }

  fetch(API + '/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pass })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { setMsg('reg-msg', data.error, 'error'); return; }
    // Auto-fill code from server response
    document.getElementById('code-email').textContent = email;
    if (data.code) document.getElementById('code-input').value = data.code;
    document.getElementById('form-register').className = 'hidden';
    document.getElementById('form-code').className = '';
    document.getElementById('code-input').focus();
    setMsg('code-msg', 'Code: ' + (data.code || 'check server'), 'info');
    setMsg('reg-msg', '', '');
  }).catch(function() { setMsg('reg-msg', 'Server error', 'error'); });
}

function doVerify() {
  var code = document.getElementById('code-input').value.trim();
  var email = document.getElementById('code-email').textContent;
  if (!code || code.length !== 6) { setMsg('code-msg', 'Enter the 6-digit code', 'error'); return; }

  fetch(API + '/api/verify-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, code: code })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { setMsg('code-msg', data.error, 'error'); return; }
    setMsg('code-msg', '✓ Verified! Now log in.', 'ok');
    document.getElementById('login-email').value = email;
    switchTab('login');
  }).catch(function() { setMsg('code-msg', 'Server error', 'error'); });
}
</script>
</body>
</html>
